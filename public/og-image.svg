<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#061124"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#0a1a35" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="#3b82f6" opacity="0.8"/>

  <!-- Logo / Brand mark -->
  <text
    x="100"
    y="280"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="160"
    font-weight="700"
    fill="#ffffff"
    letter-spacing="-4"
  >0ai</text>

  <!-- Tagline Japanese -->
  <text
    x="100"
    y="360"
    font-family="'Hiragino Kaku Gothic Pro', 'Noto Sans JP', 'Yu Gothic', sans-serif"
    font-size="28"
    font-weight="400"
    fill="#94a3b8"
  >ゼロエーアイ — 人間活動のAI化と経営支援</text>

  <!-- Tagline English -->
  <text
    x="100"
    y="410"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="400"
    fill="#64748b"
  >AI for Business | 0ai-inc.com</text>

  <!-- Divider -->
  <rect x="100" y="450" width="120" height="2" fill="#3b82f6" opacity="0.6"/>

  <!-- Company name -->
  <text
    x="100"
    y="510"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="300"
    fill="#475569"
    letter-spacing="2"
  >株式会社0ai / 0ai Inc.</text>
</svg>
